services:
  postgres:
    image: postgres:15
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - listen_addresses=*
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - automacao_net

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - automacao_net

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    container_name: evolution-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: America/Sao_Paulo
      SERVER_NAME: evolution
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://evolution-api:8080
      SERVER_DISABLE_DOCS: "true"
      SERVER_DISABLE_MANAGER: "true"

      CORS_ORIGIN: "http://localhost:1880,http://127.0.0.1:1880,http://localhost:8080,http://127.0.0.1:8080"
      CORS_METHODS: POST,GET
      CORS_CREDENTIALS: "false"

      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_CONNECTION_CLIENT_NAME: evolution

      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: "30"
      DATABASE_DELETE_MESSAGE: "false"

      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution-cache
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_SAVE_INSTANCES: "true"
      CACHE_LOCAL_ENABLED: "false"

      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "false"

      LOG_LEVEL: ERROR,WARN
      LOG_COLOR: "false"
      LOG_BAILEYS: error
      LANGUAGE: pt-BR

      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "true"

      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://webhook-gateway:3000/evolution/webhook?token=${WEBHOOK_SECRET}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_MESSAGES_UPDATE: "true"
      WEBHOOK_EVENTS_SEND_MESSAGE: "true"
      WEBHOOK_REQUEST_TIMEOUT_MS: "30000"

      WEBSOCKET_ENABLED: "false"
      WEBSOCKET_GLOBAL_EVENTS: "false"
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - automacao_net

  webhook-gateway:
    build:
      context: ./webhook-gateway
    container_name: webhook-gateway
    restart: unless-stopped
    depends_on:
      node-red:
        condition: service_started
    environment:
      PORT: 3000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_SECRET_PREVIOUS: ${WEBHOOK_SECRET_PREVIOUS:-}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      WEBHOOK_HMAC_SECRET_PREVIOUS: ${WEBHOOK_HMAC_SECRET_PREVIOUS:-}
      FORWARD_HOST: node-red
      FORWARD_PORT: 1880
      FORWARD_PATH: /evolution/webhook
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - automacao_net


  node-red:
    build:
      context: ./node-red
    container_name: node-red
    restart: unless-stopped
    depends_on:
      evolution-api:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:1880:1880"
    environment:
      TZ: America/Sao_Paulo
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      WEBHOOK_HMAC_SECRET_PREVIOUS: ${WEBHOOK_HMAC_SECRET_PREVIOUS:-}
      WEBHOOK_SIGNATURE_MAX_AGE_MS: ${WEBHOOK_SIGNATURE_MAX_AGE_MS:-300000}
      NODE_RED_ALLOWED_ORIGINS: ${NODE_RED_ALLOWED_ORIGINS:-http://localhost:1880,http://127.0.0.1:1880}
      NODE_RED_ADMIN_USER: ${NODE_RED_ADMIN_USER}
      NODE_RED_ADMIN_PASSWORD: ${NODE_RED_ADMIN_PASSWORD}
      NODE_RED_CREDENTIAL_SECRET: ${NODE_RED_CREDENTIAL_SECRET}
      NODE_RED_COOKIE_SECRET: ${NODE_RED_COOKIE_SECRET}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - nodered_data:/data
      - ./node-red/flows_secure.json:/data/flows.json:rw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1880 >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    security_opt:
      - no-new-privileges:true
    networks:
      - automacao_net

volumes:
  nodered_data:
  evolution_instances:
  redis_data:
  postgres_data:

networks:
  automacao_net:
    driver: bridge
